<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>{{.Title}}</title>

  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="/static/css/dashboard/dashboard.css">

  <!-- Scripts -->
  <script src="/static/js/dashboard/main.js" defer></script>
  <script src="/static/js/dashboard/loadContext.js" defer></script>
  <script src="/static/js/dashboard/modal.js" defer></script>
  <script src="/static/js/dashboard/agentFactory.js" defer></script>
  <script src="https://unpkg.com/cytoscape@3.24.0/dist/cytoscape.min.js"></script>

</head>
<body class="bg-gray-100 text-gray-800 font-sans">

  <!-- Toast -->
  <div id="message-toast"
       class="fixed top-4 left-1/2 transform -translate-x-1/2
              bg-green-500 text-white px-4 py-2 rounded shadow
              transition-opacity duration-300 opacity-0 pointer-events-none hidden">
    SUCCESSFULLY DISCONNECTED.
  </div>

  <div id="dashboard-wrapper" class="flex overflow-x-hidden bg-gray-950">

    <!-- SIDEBAR -->
    <aside id="sidebar"
          class="sidebar flex-shrink-0 h-screen bg-gray-900 text-white font-mono
                  p-4 flex flex-col transition-all duration-300 ease-in-out">

      <!-- HEADER : burger + title -->
      <div class="sidebar-header">
        <h2 class="text-xl font-bold sidebar-title">{{.Title}} – DASHBOARD</h2>
        <button id="toggle-sidebar-btn"
                class="sidebar-toggle p-2 rounded hover:bg-gray-700"
                onclick="toggleSidebar()">☰</button>
      </div>

      <!-- MASKABLE CONTENT -->
      <div class="sidebar-content flex flex-col flex-1 min-h-0 space-y-6">

        <!-- USER INFO -->
        <div class="user-info">
          <p class="text-sm mb-4">USER: {{.Username}}</p>
          <button class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600"
                  onclick="logout()">LOGOUT</button>
          <div class="mt-4 border-t border-gray-700"></div>
        </div>

        <!-- LOGS -->
        <div class="logs-container flex-1 flex flex-col min-h-0">
          <div class="logs-header flex justify-between items-center mb-2">
            <h3 class="text-lg font-semibold">LOGS</h3>
            <button class="expand-logs-btn text-gray-600 border border-gray-600 rounded hover:text-black"
                    onclick="toggleLogsModal()" title="Expand logs">⤢</button>
          </div>
          <pre id="logs"
              class="bg-black text-gray-500 p-2 rounded flex-1 min-h-0 overflow-auto text-sm">
          </pre>
        </div>

      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="w-4/5 bg-gray-950 text-blue-200 font-mono
                 flex flex-col h-screen">
      <!-- Tabs -->
      <nav class="tabs flex space-x-4 p-6 pt-8">
        <button id="tab-overview"
                class="tab-button px-4 py-2 rounded transition"
                onclick="showTab('overview')">OVERVIEW</button>
        <button id="tab-agents"
                class="tab-button px-4 py-2 rounded transition"
                onclick="showTab('agents')">AGENTS</button>
        <button id="tab-graph"
                class="tab-button px-4 py-2 rounded transition"
                onclick="showTab('graph')">GRAPH VIEW</button>
      </nav>

      <div class="tab-content flex-1 overflow-hidden p-6 space-y-6">

        <!-- OVERVIEW TAB -->
        <div id="overview-tab"
             class="tab active
                    grid grid-cols-2 grid-rows-2 auto-rows-fr gap-6
                    h-full">
          <!-- Merge Top -->
          <section class="col-span-2 flex border border-gray-500
                            rounded bg-gray-900 p-4">
            <!-- Active Connections -->
            <div class="w-1/2 pr-4 border-r border-gray-700 flex flex-col">
              <div class="flex justify-between items-center mb-2">
                <h3 id="active-conn-title" class="text-white font-semibold mb-2">
                  ACTIVE AGENTS
                </h3>
                <button class="px-2 py-1 text-sm rounded border border-red-500
                                text-red-300 hover:bg-red-500
                                hover:text-gray-900 transition"
                          onclick="flushAgents()">FLUSH</button>
              </div>
              <div class="filter-actions mb-2">
                <input type="text" id="connection-filter"
                       placeholder="Filter connections..."
                       class="px-2 py-1 w-full rounded bg-black text-white">
              </div>
              <div class="bulk-buttons flex space-x-2 mb-2">
                <button class="px-3 py-1 rounded border border-green-500
                               text-green-300 hover:bg-green-500
                               hover:text-gray-900 transition"
                        onclick="selectAllConnection()">SELECT ALL</button>
                <button class="px-3 py-1 rounded border border-green-500
                               text-green-300 hover:bg-green-500
                               hover:text-gray-900 transition"
                        onclick="unselectAllConnection()">UNSELECT ALL</button>
              </div>
              <div id="connections-list"
                   class="connections-list border rounded p-2 flex-1 overflow-auto">
              </div>
            </div>
            <!-- Send Commands -->
            <div class="w-1/2 pl-4 flex flex-col">
              <h4 class="text-white font-semibold mb-2">SEND COMMANDS</h4>
              <div class="commands-part flex-1 flex flex-col space-y-2 overflow-auto">
                <div class="flex items-center border border-gray-700 rounded bg-black px-2 py-1">
                  <span class="text-green-400 pr-2">></span>
                  <input type="text" id="in-command"
                        placeholder="Type a command..."
                        class="flex-1 bg-black text-white border-none focus:outline-none" />
                  <button class="ml-2 px-3 py-1 rounded border border-green-500
                                text-green-300 hover:bg-green-500 hover:text-gray-900 transition"
                          onclick="sendCommand()">Send</button>
                </div>
                <div id="watched-list"
                    class="watched-connections border rounded p-2 flex-1 overflow-auto">
                </div>
              </div>
            </div>
          </section>

          <!-- Pending Commands -->
          <section class="flex flex-col border border-gray-500
                            rounded bg-gray-900 p-4">
            <div class="flex justify-between items-center mb-2">
              <h3 class="text-white font-semibold mb-2">PENDING COMMANDS - FIFO</h3>
              <button class="px-2 py-1 text-sm rounded border border-red-500
                                text-red-300 hover:bg-red-500
                                hover:text-gray-900 transition"
                          onclick="flushCommands()">FLUSH</button>
            </div>
            <div class="filter-actions mb-2">
              <input type="text" id="command-filter"
                     placeholder="Filter commands..."
                     class="px-2 py-1 w-full rounded bg-black text-white">
            </div>
            <div id="commands-list"
                 class="commands-list border rounded p-2 flex-1 overflow-auto">
            </div>
          </section>

          <!-- Report Execution -->
          <section class="flex flex-col border border-gray-500
                            rounded bg-gray-900 p-4">
            <div class="flex justify-between items-center mb-2">
              <h3 class="text-white font-semibold mb-2">REPORT EXECUTION</h3>
              <button class="px-2 py-1 text-sm rounded border border-red-500
                                text-red-300 hover:bg-red-500
                                hover:text-gray-900 transition"
                          onclick="flushReports()">FLUSH</button>
            </div>
            <div class="filter-actions mb-2">
              <input type="text" id="report-filter"
                     placeholder="Filter reports..."
                     class="px-2 py-1 w-full rounded bg-black text-white">
            </div>
            <div id="reports-list"
                 class="report-scrollable border rounded p-2 flex-1 overflow-auto">
            </div>
          </section>
        </div>

        <!-- AGENTS TAB -->
        <div id="agents-tab" class="tab hidden p-4 pt-8 space-y-4 overflow-y-auto max-h-[calc(100vh-4rem)]">

          <div class="tab-content flex-1 overflow-y-auto p-6 space-y-6">
            <!-- Header with filter and button -->
            <div class="flex justify-between items-center sticky top-0 bg-gray-950 py-4 z-10 border-b border-gray-700">
              <!-- Filtre -->
              <input type="text" id="agent-filter"
                    placeholder="Filter agents..."
                    class="px-3 py-2 rounded bg-black text-white border border-gray-600 w-1/3">

              <!-- Create Agent button -->
              <button onclick="createAgentModal()"
                      class="px-4 py-2 bg-green-400 text-white rounded hover:bg-green-600 transition">
                [+] Create Agent
              </button>
            </div>

          
            <!-- Connections table -->
            <div class="border border-gray-600 rounded bg-gray-900 max-h-[400px] overflow-y-auto">
              <table class="min-w-full text-white text-sm">
                <thead class="bg-gray-800 text-cyan-300 sticky top-0 z-10">
                  <tr>
                    <th class="px-4 py-2 text-left">NAME</th>
                    <th class="px-4 py-2 text-left">ID</th>
                    <th class="px-4 py-2 text-left">IP</th>
                    <th class="px-4 py-2 text-left">PORT</th>
                    <th class="px-4 py-2 text-left">OS</th>
                    <th class="px-4 py-2 text-left">TYPE</th>
                    <th class="px-4 py-2 text-left">LAST CONNECTION</th>
                    <th class="px-4 py-2 text-left">ICON</th>
                    <th class="px-4 py-2 text-left">REACHABLE</th>
                    <th class="px-4 py-2 text-left"></th>
                  </tr>
                </thead>
                <tbody id="agents-table-body">
                  <!-- Dynamic agent line -->
                </tbody>
              </table>
            </div>


            <!-- Terminal direct agent -->
            <div id="terminal-panel" class="hidden mt-6 border border-gray-700 rounded bg-black text-white p-4">
              <div class="mb-2 text-green-400 font-mono text-sm">
                <span id="terminal-agent-id" class="font-bold"></span>
              </div>

              <div id="terminal-output" class="h-64 overflow-y-auto bg-black p-2 font-mono text-sm border border-gray-700 rounded mb-4"></div>

              <div class="flex items-center">
                <span class="text-green-400 pr-2 font-mono">></span>
                <input type="text" id="terminal-input"
                      placeholder="Enter command..."
                      class="flex-grow px-3 py-2 rounded bg-black text-white border font-mono"
                      onkeydown="if(event.key === 'Enter') sendTerminalCommand()">
                <div id="terminal-spinner" class="ml-2 hidden animate-spin rounded-full h-5 w-5 border-t-2 border-b-2 border-green-400"></div>
                <button onclick="sendTerminalCommand()"
                        class="ml-2 px-4 py-2 bg-green-500 text-white rounded hover:bg-green-700 transition">
                  Send
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- GRAPH TAB -->
        <div id="graph-tab" class="tab hidden">
          <!-- Recenter button -->
          <button id="recenter-graph"
                  class="px-2 py-1 bg-gray-700 text-white rounded hover:bg-gray-600 z-10">
            Recenter
          </button>

          <!-- Graph canvas -->
          <div id="c2-network-canvas"
              class="bg-black border border-white rounded shadow h-[500px] w-full">
          </div>
        </div>
      </div>
    </main>
  

  <!-- Logs Modal -->
  <div id="logs-modal" class="fixed inset-0 bg-black bg-opacity-50
                             flex items-center justify-center hidden z-50">
    <div class="bg-gray-900 rounded shadow-lg w-11/12 max-w-6xl p-6">
      <div class="logs-modal-header flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-white">LOGS - EXPAND</h3>
        <button class="close-logs-btn text-gray-600 hover:text-black text-xl"
                onclick="toggleLogsModal()">✕</button>
      </div>
      <div class="logs-modal-content">
        <pre id="logs-modal-output"
             class="bg-gray-950 text-green-300 p-4 rounded h-[70vh] overflow-auto text-sm">
        </pre>
      </div>
    </div>
  </div>

  <!-- Report Modal -->
  <div id="report-modal"
       class="modal fixed inset-0 bg-black bg-opacity-50
              flex items-center justify-center hidden">
    <div class="modal-content bg-gray-900 rounded shadow-lg
                w-11/12 max-w-6xl p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 id="modal-title" class="text-lg text-white font-bold mb-2"></h2>
        <span class="close-btn text-gray-600 hover:text-black text-xl cursor-pointer">✕</span>
      </div>
      <div id="modal-body"
           class="bg-gray-950 p-4 text-green-300 rounded max-h-[70vh] overflow-auto text-sm">
    </div>
    </div>
  </div>

  <!-- Commands Modal -->
  <div id="commands-modal"
     class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center hidden z-50">
    <div class="relative bg-gray-900 rounded-lg shadow-xl w-11/12 max-w-5xl p-6 font-mono text-green-300 overflow-hidden">
      <div class="flex justify-between items-center mb-4">
        <h3 id="commands-modal-title" class="text-lg font-bold">
          Commands for <span class="text-green-100" id="commands-modal-id"></span>
        </h3>
        <button class="text-gray-600 hover:text-black text-xl"
                onclick="closeCommandsModal()">✕</button>
      </div>
      <div id="commands-modal-content"
          class="space-y-2 max-h-[70vh] overflow-auto pr-2">
        <!-- .command-item injected -->
      </div>
    </div>
  </div>

  <!-- Modal Create Agent -->
   <div id="create-agent-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
    <div class="bg-gray-800 p-6 rounded space-y-4 w-96">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-white text-lg">Create a new agent</h2>
        <button class="text-gray-600 hover:text-black text-xl"
                onclick="closeAgentModal()">✕</button>
      </div>

      <!-- Agent Name -->
      <div id="name-part">
        <label class="text-white text-lg mt-4 mb-2">Name :</label>
        <input type="text" id="agent-name" placeholder="Agent name" class="w-full px-3 py-2 rounded bg-black text-white border border-gray-600">
      </div>

      <!-- Operating System -->
      <div id="os-part">
        <label class="text-white text-lg mt-4 mb-2">Operating System :</label>
        <select id="agent-os" class="w-full px-3 py-2 rounded bg-black text-white border border-gray-600">
          <option value="windows">windows</option>
          <option value="linux">linux</option>
        </select>
      </div>

      <!-- Type -->
      <div id="type-part">
        <label class="text-white text-lg mt-4 mb-2">Type :</label>
        <select id="agent-type" class="w-full px-3 py-2 rounded bg-black text-white border border-gray-600">
          <option value="simple">Simple Client</option>
          <option value="stealthy">Stealthy Client</option>
        </select>
      </div>

      <!-- Icon -->
       <div id="icon-part" class="">
        <label class="text-white text-lg mt-4">Icon :</label>
        <select id="agent-icon" class="w-full px-3 py-2 rounded bg-black text-white border border-gray-600">
            <option value="none">none</option>
            <option value="calc">calc</option>
            <option value="notepad-old">notepad-old</option>
            <option value="notepad-plus-plus">notepad++</option>
            <option value="notepad">notepad</option>
            <option value="settings">settings</option>
        </select>

        <img src="/static/img/icon/none.ico" id="icon-preview" alt="preview" class="mx-auto mt-4 w-16 h-16 object-contain"/>
      </div>

      <!-- Submit -->
      <button onclick="submitAgent()" class="w-full px-4 py-2 bg-green-500 text-white rounded hover:bg-green-700">Create</button>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('dashboard-wrapper').classList.add('animate-fade-in');
      showTab('overview');
    });
  </script>
</body>
</html>
